<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Aide & secours – WTD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
<a class="skip-link" href="#contenu">Aller au contenu</a>

<header class="site-header">
<div class="container">
<h1>Besoin d’aide</h1>
</div>
</header>

<main id="contenu">

<section class="card danger-zone">
<h2>🚨 Aide immédiate</h2>
<button id="dangerBtn" class="btn btn-danger">JE SUIS EN DANGER</button>
<div id="dangerOutput"></div>
</section>

<section class="card">
<h2>Mode secours hors-ligne</h2>
<div id="offlineSecours"></div>
</section>

<section class="card">
<h2>Mode écran noir</h2>
<button id="blackModeBtn" class="btn btn-secondary">🖤 Activer écran noir</button>
</section>

<section class="card">
<h2>SMS d’aide</h2>
<button id="smsHelpBtn" class="btn btn-secondary">✉️ Préparer un SMS</button>
<div id="smsOutput"></div>
</section>

</main>

<div id="blackScreen" class="black-screen" hidden>
<div class="black-content">
<p class="black-title">BESOIN D’AIDE</p>
<p>Je suis en difficulté. Merci de m’aider.</p>
<p class="small">Sahirana aho. Azafady mba ampio aho.</p>
<button id="exitBlackMode" class="black-exit">✖</button>
</div>
</div>

<script src="../assets/js/bot.js"></script>
<script src="../assets/js/offline-secours.js"></script>
</body>
</html>
