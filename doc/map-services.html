<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte des services – WTD-Madagascar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
<a class="skip-link" href="#contenu">Aller au contenu</a>

<header class="site-header">
<div class="container">
<h1>WTD-Madagascar</h1>
<p>Cartographie terrain & inclusion</p>
<nav class="site-nav">
<a href="../index.html">Accueil</a>
<a href="services.html">Services</a>
<a href="transport-accessible.html">Transport</a>
<a aria-current="page">Carte</a>
<a href="bot-dashboard.html">Bot</a>
</nav>
</div>
</header>

<main id="contenu">
<section class="card">
<h2>Carte des services accessibles</h2>
<p>Carte indicative terrain – aucune donnée personnelle.</p>
</section>

<section class="card">
<div class="map-filters">
<label><input type="checkbox" id="f-transport" checked> 🚐 Transports</label>
<label><input type="checkbox" id="f-relais" checked> 🤝 Relais</label>
<label><input type="checkbox" id="f-accessible" checked> ♿ Accessibles</label>
</div>

<div id="map" style="height:500px;border-radius:12px;"></div>
</section>
</main>

<footer class="site-footer">
<p>© WTD-Madagascar — Carte humaine & terrain</p>
</footer>

<script>
const map = L.map("map").setView([-18.8792,47.5079],6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{attribution:"© OpenStreetMap"}).addTo(map);

const icons={
 transport:L.icon({iconUrl:"../assets/img/marker-transport.png",iconSize:[28,42],iconAnchor:[14,42]}),
 relais:L.icon({iconUrl:"../assets/img/marker-relais.png",iconSize:[28,42],iconAnchor:[14,42]})
};

let markers=[];
fetch("../data/map-points.json")
.then(r=>r.json())
.then(d=>{
 d.points.forEach(p=>{
  const m=L.marker([p.lat,p.lng],{icon:icons[p.type]})
  .bindPopup(`
   <strong>${p.name}</strong><br>
   Type : ${p.type}<br>
   Accessibilité : ${p.accessible?"✔":"❌"}<br>
   ${p.access_details}<br>
   Disponibilité : <b>${p.availability}</b><br>
   <a href="bot-dashboard.html?from=${p.id}" class="btn btn-danger">🆘 Besoin d’aide</a>
  `);
  m._wtd=p;
  m.addTo(map);
  markers.push(m);
 });
});

function applyFilters(){
 markers.forEach(m=>{
  const p=m._wtd;
  const show =
   (f_transport.checked||p.type!=="transport") &&
   (f_relais.checked||p.type!=="relais") &&
   (f_accessible.checked||p.accessible);
  show?m.addTo(map):map.removeLayer(m);
 });
}
["f-transport","f-relais","f-accessible"]
.forEach(id=>document.getElementById(id).onchange=applyFilters);
</script>
</body>
</html>
