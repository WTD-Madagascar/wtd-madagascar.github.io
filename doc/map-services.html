<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WTD Madagascar – Carte des services</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body{margin:0;height:100%;font-family:system-ui,sans-serif}
#header{background:#0b4a6f;color:#fff;padding:10px;font-weight:700}
#map{height:calc(100% - 50px)}
.bot-icon{text-align:center}
footer{font-size:11px;text-align:center;padding:4px}
</style>
</head>

<body>

<div id="header">
Un problème ? Signale-le. Tu aides les autres.
</div>

<div id="map"></div>

<footer>
Aucune donnée personnelle • Signalement anonyme • Usage collectif
</footer>

<script>
/* =============================
   CARTE
============================= */
const map = L.map("map").setView([-18.879,47.5079],6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OpenStreetMap"
}).addTo(map);

const botLayer = L.layerGroup().addTo(map);

/* =============================
   ICÔNES
============================= */
function getIcon(type){
  const icons={
    accident_urgence:"🚨",
    transport_bloque:"🚌",
    route_probleme:"🚧",
    besoin_aide:"🧭",
    service_accessible:"♿"
  };
  return L.divIcon({
    className:"bot-icon",
    html:`<div style="font-size:22px">${icons[type]||"⚠️"}</div>`,
    iconSize:[24,24],
    iconAnchor:[12,12]
  });
}

/* =============================
   EXPIRATION
============================= */
function expired(s){
  return s.expires_at && new Date(s.expires_at) < new Date();
}

/* =============================
   CHARGEMENT GOOGLE SHEET
============================= */
async function loadBot(){
  try{
    const r = await fetch(
      "https://opensheet.elk.sh/1953pIQSeQoe_1Iu_L-VRtKSN5GQRHMBy5HqnSaTB7io/WTD_MAP_SIGNALS",
      { cache:"no-store" }
    );
    const data = await r.json();

    botLayer.clearLayers();

    data
      .filter(s => s.lat && s.lng && !expired(s))
      .sort((a,b)=>(Number(b.priority)||0)-(Number(a.priority)||0))
      .forEach(s=>{
        const marker = L.marker(
          [Number(s.lat), Number(s.lng)],
          { icon:getIcon(s.type) }
        );

        marker.bindPopup(`
          <strong>${(s.type||"").replace("_"," ")}</strong><br>
          ${s.label||""}<br>
          ${s.message||""}<br>
          <small>${new Date(s.created_at).toLocaleString()}</small>
        `);

        botLayer.addLayer(marker);
      });

  }catch(e){
    console.warn("Erreur chargement données :", e);
  }
}

loadBot();
setInterval(loadBot,30000);

/* =============================
   OFFLINE (optionnel)
============================= */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
